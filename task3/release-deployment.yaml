apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-release
  namespace: release-skorokhid
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-release
  template:
    metadata:
      labels:
        app: web-release
    spec:
      containers:
      - name: app-container
        image: nginx:1.21 # Замінити на власний Docker-образ з тегом 1.0.0
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: app-release-service
  namespace: release-skorokhid
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30003
  selector:
    app: web-release