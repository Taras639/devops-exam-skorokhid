apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-dev
  namespace: dev-skorokhid
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-dev
  template:
    metadata:
      labels:
        app: web-dev
    spec:
      containers:
      - name: app-container
        image: nginx:latest # Замінити на власний Docker-образ з тегом develop
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: app-dev-service
  namespace: dev-skorokhid
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30002
  selector:
    app: web-dev