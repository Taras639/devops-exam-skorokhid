---
- name: Встановлення компонентів на skorokhid-node
  hosts: all
  become: yes
  tasks:
    - name: Оновлення apt
      apt:
        update_cache: yes

    - name: Встановлення Docker
      apt:
        name: docker.io
        state: present

    - name: Завантаження Minikube
      get_url:
        url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        dest: /usr/local/bin/minikube
        mode: '0755'

    - name: Встановлення kubectl
      shell: curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" && install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

    - name: Додавання користувача до групи docker
      user:
        name: root
        groups: docker
        append: yes

    - name: Запуск Minikube
      command: minikube start --driver=docker --force
      environment:
        HTTP_PROXY: ""
        HTTPS_PROXY: ""